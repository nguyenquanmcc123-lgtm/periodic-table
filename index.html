<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Periodic Table</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#081b3a;
color:white;
text-align:center;
}

/* SEARCH */

#search{
margin:15px;
padding:10px;
width:260px;
border-radius:6px;
border:none;
}

/* TABLE */

#table{
display:grid;
grid-template-columns:repeat(18,1fr);
gap:6px;
max-width:1200px;
margin:auto;
padding:10px;
}

.element{
border-radius:6px;
padding:8px;
cursor:pointer;
font-size:12px;
position:relative;
transition:0.2s;
}

.element:hover{
transform:scale(1.08);
}

.num{
font-size:9px;
position:absolute;
top:4px;
left:6px;
}

.sym{
font-size:18px;
font-weight:bold;
}

/* IUPAC COLORS */

.alkali{background:#ff6666}
.alkaline{background:#ffdead}
.transition{background:#ffc0cb}
.post{background:#cccccc}
.metalloid{background:#cccc99}
.nonmetal{background:#a0ffa0}
.halogen{background:#ffff99}
.noble{background:#b0e0ff}

/* POPUP */

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#0e2a55;
padding:20px;
border-radius:10px;
display:none;
width:320px;
}

#viewer{
height:350px;
margin-top:15px;
}

button{
margin-top:10px;
padding:6px 10px;
}

/* MOBILE */

@media(max-width:900px){

#table{
grid-template-columns:repeat(9,1fr);
}

}

</style>

</head>

<body>

<h2>⚛️ Interactive Periodic Table</h2>

<input id="search" placeholder="Search element">

<div id="table"></div>

<div id="popup">

<h3 id="name"></h3>
<p id="info"></p>
<p id="mass"></p>
<p id="config"></p>

<div id="viewer"></div>

<button onclick="closePopup()">Close</button>

</div>

<script>

/* BASIC ELEMENT DATA */

const elements=[
{n:1,s:"H",name:"Hydrogen",mass:1.008,group:1,row:1,type:"nonmetal",config:"1s¹",shell:[1]},
{n:2,s:"He",name:"Helium",mass:4.0026,group:18,row:1,type:"noble",config:"1s²",shell:[2]},

{n:3,s:"Li",name:"Lithium",mass:6.94,group:1,row:2,type:"alkali",config:"[He]2s¹",shell:[2,1]},
{n:4,s:"Be",name:"Beryllium",mass:9.0122,group:2,row:2,type:"alkaline",config:"[He]2s²",shell:[2,2]},
{n:5,s:"B",name:"Boron",mass:10.81,group:13,row:2,type:"metalloid",config:"[He]2s²2p¹",shell:[2,3]},
{n:6,s:"C",name:"Carbon",mass:12.011,group:14,row:2,type:"nonmetal",config:"[He]2s²2p²",shell:[2,4]},
{n:7,s:"N",name:"Nitrogen",mass:14.007,group:15,row:2,type:"nonmetal",config:"[He]2s²2p³",shell:[2,5]},
{n:8,s:"O",name:"Oxygen",mass:15.999,group:16,row:2,type:"nonmetal",config:"[He]2s²2p⁴",shell:[2,6]},
{n:9,s:"F",name:"Fluorine",mass:18.998,group:17,row:2,type:"halogen",config:"[He]2s²2p⁵",shell:[2,7]},
{n:10,s:"Ne",name:"Neon",mass:20.180,group:18,row:2,type:"noble",config:"[He]2s²2p⁶",shell:[2,8]}
];

/* AUTO GENERATE REST */

for(let i=11;i<=118;i++){

elements.push({
n:i,
s:"E"+i,
name:"Element "+i,
mass:(i*2),
group:(i%18)+1,
row:Math.floor(i/18)+1,
type:"transition",
config:"unknown",
shell:[2,8,8]
});

}

/* BUILD TABLE */

const table=document.getElementById("table");

elements.forEach(el=>{

let d=document.createElement("div");

d.className="element "+el.type;

d.style.gridColumn=el.group;
d.style.gridRow=el.row;

d.dataset.search=(el.name+el.s+el.n).toLowerCase();

d.innerHTML=
`<div class="num">${el.n}</div>
<div class="sym">${el.s}</div>`;

d.onclick=()=>openElement(el);

table.appendChild(d);

});

/* SEARCH */

document.getElementById("search").oninput=function(){

let v=this.value.toLowerCase();

document.querySelectorAll(".element").forEach(el=>{

if(el.dataset.search.includes(v)){
el.style.display="block";
}else{
el.style.display="none";
}

});

};

/* POPUP */

function openElement(el){

document.getElementById("popup").style.display="block";

document.getElementById("name").innerText=el.name;
document.getElementById("info").innerText="Atomic number: "+el.n;
document.getElementById("mass").innerText="Atomic mass: "+el.mass;
document.getElementById("config").innerText="Electron config: "+el.config;

buildAtom(el.shell);

}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* 3D ATOM */

let scene,camera,renderer,controls;

function buildAtom(shell){

document.getElementById("viewer").innerHTML="";

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
75,
300/350,
0.1,
1000
);

renderer=new THREE.WebGLRenderer();

renderer.setSize(300,350);

document.getElementById("viewer").appendChild(renderer.domElement);

controls=new THREE.OrbitControls(camera,renderer.domElement);

camera.position.z=40;

/* nucleus */

const geo=new THREE.SphereGeometry(2,32,32);
const mat=new THREE.MeshBasicMaterial({color:0xffff00});
const nucleus=new THREE.Mesh(geo,mat);
scene.add(nucleus);

/* electrons */

shell.forEach((count,i)=>{

let r=6+(i*5);

for(let j=0;j<count;j++){

const eGeo=new THREE.SphereGeometry(0.6,16,16);
const eMat=new THREE.MeshBasicMaterial({color:0x00ffff});

const e=new THREE.Mesh(eGeo,eMat);

let angle=(j/count)*Math.PI*2;

e.userData={r,angle};

scene.add(e);

}

});

/* animate */

function animate(){

requestAnimationFrame(animate);

scene.children.forEach(o=>{

if(o.userData.r){

o.userData.angle+=0.02;

o.position.x=Math.cos(o.userData.angle)*o.userData.r;
o.position.z=Math.sin(o.userData.angle)*o.userData.r;

}

});

controls.update();

renderer.render(scene,camera);

}

animate();

}

</script>

</body>
</html>
