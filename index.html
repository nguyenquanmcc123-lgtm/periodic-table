<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Periodic Table</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#061633;
color:white;
text-align:center;
}

/* SEARCH */

#search{
margin:15px;
padding:10px;
width:250px;
border-radius:6px;
border:none;
}

/* TABLE */

#table{
display:grid;
grid-template-columns:repeat(18,1fr);
gap:6px;
max-width:1100px;
margin:auto;
padding:10px;
}

/* ELEMENT */

.element{
border-radius:8px;
padding:8px;
cursor:pointer;
position:relative;
font-size:12px;
transition:0.2s;
}

.element:hover{
transform:scale(1.1);
}

.num{
font-size:9px;
position:absolute;
top:4px;
left:6px;
}

.sym{
font-size:18px;
font-weight:bold;
}

/* IUPAC COLORS */

.alkali{background:#ff6666}
.alkaline{background:#ffdead}
.transition{background:#ffc0cb}
.post{background:#cccccc}
.metalloid{background:#cccc99}
.nonmetal{background:#a0ffa0}
.halogen{background:#ffff99}
.noble{background:#b0e0ff}

/* POPUP */

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#0c1f44;
padding:20px;
border-radius:10px;
display:none;
}

#popup button{
margin-top:10px;
}

/* 3D AREA */

#viewer{
width:100%;
height:400px;
margin-top:30px;
}

canvas{
display:block;
}

</style>

</head>

<body>

<h2>⚛️ 3D Periodic Table</h2>

<input id="search" placeholder="Tìm nguyên tố">

<div id="table"></div>

<div id="popup">
<h3 id="pname"></h3>
<p id="pnum"></p>
<button onclick="closePopup()">Đóng</button>
</div>

<div id="viewer"></div>

<script>

/* ELEMENT DATA */

const elements=[
{n:1,s:"H",name:"Hydrogen",g:"nonmetal",shell:[1]},
{n:2,s:"He",name:"Helium",g:"noble",shell:[2]},
{n:3,s:"Li",name:"Lithium",g:"alkali",shell:[2,1]},
{n:4,s:"Be",name:"Beryllium",g:"alkaline",shell:[2,2]},
{n:5,s:"B",name:"Boron",g:"metalloid",shell:[2,3]},
{n:6,s:"C",name:"Carbon",g:"nonmetal",shell:[2,4]},
{n:7,s:"N",name:"Nitrogen",g:"nonmetal",shell:[2,5]},
{n:8,s:"O",name:"Oxygen",g:"nonmetal",shell:[2,6]},
{n:9,s:"F",name:"Fluorine",g:"halogen",shell:[2,7]},
{n:10,s:"Ne",name:"Neon",g:"noble",shell:[2,8]}
];

/* BUILD TABLE */

const table=document.getElementById("table");

elements.forEach(el=>{

let d=document.createElement("div");

d.className="element "+el.g;

d.dataset.name=el.name.toLowerCase();

d.innerHTML=
`<div class="num">${el.n}</div>
<div class="sym">${el.s}</div>`;

d.onclick=()=>showElement(el);

table.appendChild(d);

});

/* SEARCH */

document.getElementById("search").oninput=function(){

let v=this.value.toLowerCase();

document.querySelectorAll(".element").forEach(el=>{

if(el.dataset.name.includes(v)){
el.style.display="block";
}else{
el.style.display="none";
}

});

};

/* POPUP */

function showElement(el){

document.getElementById("pname").innerText=el.name;
document.getElementById("pnum").innerText="Atomic number: "+el.n;

document.getElementById("popup").style.display="block";

buildAtom(el.shell);

}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* THREEJS ATOM */

let scene,camera,renderer;

function buildAtom(shell){

document.getElementById("viewer").innerHTML="";

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/400,
0.1,
1000
);

renderer=new THREE.WebGLRenderer();

renderer.setSize(window.innerWidth,400);

document.getElementById("viewer").appendChild(renderer.domElement);

camera.position.z=40;

/* nucleus */

const geo=new THREE.SphereGeometry(2,32,32);
const mat=new THREE.MeshBasicMaterial({color:0xffff00});
const nucleus=new THREE.Mesh(geo,mat);
scene.add(nucleus);

/* shells */

shell.forEach((count,i)=>{

let r=6+(i*4);

const orbitGeo=new THREE.RingGeometry(r,r+0.05,64);
const orbitMat=new THREE.MeshBasicMaterial({
color:0xffffff,
side:THREE.DoubleSide
});

const ring=new THREE.Mesh(orbitGeo,orbitMat);
ring.rotation.x=Math.PI/2;
scene.add(ring);

for(let j=0;j<count;j++){

const eGeo=new THREE.SphereGeometry(0.5,16,16);
const eMat=new THREE.MeshBasicMaterial({color:0x00ffff});

const e=new THREE.Mesh(eGeo,eMat);

let angle=(j/count)*Math.PI*2;

e.userData={r,angle};

scene.add(e);

}

});

/* animate */

function animate(){

requestAnimationFrame(animate);

scene.children.forEach(o=>{

if(o.userData.r){

o.userData.angle+=0.02;

o.position.x=Math.cos(o.userData.angle)*o.userData.r;
o.position.z=Math.sin(o.userData.angle)*o.userData.r;

}

});

renderer.render(scene,camera);

}

animate();

}

</script>

</body>
</html>
