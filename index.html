<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Bảng Tuần Hoàn Tương Tác</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>⚛️ Phòng Thí Nghiệm Hóa Học</h1>

</header>

<div id="layout">

<div id="sidebar">

<h3>🧪 Molecule Builder</h3>

<select id="elementSelect">

<option value="H">Hiđrô</option>
<option value="O">Oxi</option>
<option value="C">Cacbon</option>
<option value="N">Nitơ</option>

</select>

<button onclick="addAtom()">Thêm nguyên tử</button>

<button onclick="clearMolecule()">Xóa</button>

<hr>

<h3>🌌 Electron Orbital</h3>

<button onclick="showOrbital('s')">s</button>
<button onclick="showOrbital('p')">p</button>
<button onclick="showOrbital('d')">d</button>
<button onclick="showOrbital('f')">f</button>

<hr>

<h3>📊 Biểu đồ hóa học</h3>

<canvas id="chart"></canvas>

</div>

<div id="viewer">

<div id="three"></div>

</div>

</div>

<script src="js/elements.js"></script>
<script src="js/orbitals.js"></script>
<script src="js/molecule.js"></script>
<script src="js/chart.js"></script>
<script src="js/main.js"></script>

</body>
</html>
