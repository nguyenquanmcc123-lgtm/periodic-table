<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Bảng tuần hoàn 3D</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

h1{
text-align:center;
margin:20px;
}

#search{
display:block;
margin:auto;
padding:10px;
width:260px;
border-radius:8px;
border:none;
}

#table{

display:grid;
grid-template-columns:repeat(18,65px);
gap:6px;

justify-content:center;

margin-top:20px;

}

.element{

height:65px;
border-radius:8px;

display:flex;
flex-direction:column;

align-items:center;
justify-content:center;

cursor:pointer;

transition:.2s;

}

.element:hover{

transform:scale(1.15);

}

.number{font-size:10px}

.symbol{
font-size:20px;
font-weight:bold
}

.name{
font-size:9px
}

/* màu chuẩn */

.alkali{background:#ef4444}
.alkaline{background:#f97316}
.transition{background:#3b82f6}
.metalloid{background:#14b8a6}
.nonmetal{background:#10b981}
.halogen{background:#eab308}
.noble{background:#a855f7}

/* popup */

#popup{

position:fixed;

top:50%;
left:50%;

transform:translate(-50%,-50%);

background:#1e293b;

padding:20px;

border-radius:12px;

display:none;

width:450px;

box-shadow:0 0 20px black;

}

#atom{

width:400px;
height:300px;

}

button{

padding:8px 16px;
border:none;
border-radius:6px;
cursor:pointer;

}

</style>

</head>

<body>

<h1>🧪 Bảng Tuần Hoàn Tương Tác</h1>

<input id="search" placeholder="Tìm nguyên tố...">

<div id="table"></div>

<div id="popup">

<h2 id="pname"></h2>

<p id="pinfo"></p>

<div id="atom"></div>

<br>

<button onclick="closePopup()">Đóng</button>

</div>

<script>

/* tạo dữ liệu 118 nguyên tố */

const elements=[]

const names=[
"Hiđrô","Heli","Liti","Beri","Bo","Cacbon","Nitơ","Oxi","Flo","Neon",
"Natri","Magiê","Nhôm","Silic","Photpho","Lưu huỳnh","Clo","Argon"
]

for(let i=1;i<=118;i++){

elements.push({

n:i,
s:"E"+i,
name:names[i-1]||("Nguyên tố "+i),

mass:Math.round(i*2.1),

group:(i%18)+1,

period:Math.ceil(i/18),

cat:["alkali","alkaline","transition","metalloid","nonmetal","halogen","noble"][i%7],

conf:"đang cập nhật"

})

}

/* vẽ bảng */

const table=document.getElementById("table")

function draw(){

table.innerHTML=""

elements.forEach(e=>{

let el=document.createElement("div")

el.className="element "+e.cat

el.style.gridColumn=e.group
el.style.gridRow=e.period

el.innerHTML=`

<div class="number">${e.n}</div>
<div class="symbol">${e.s}</div>
<div class="name">${e.name}</div>

`

el.onclick=()=>show(e)

table.appendChild(el)

})

}

draw()

/* search */

search.oninput=e=>{

let q=e.target.value.toLowerCase()

document.querySelectorAll(".element").forEach(el=>{

el.style.display=el.innerText.toLowerCase().includes(q)?"flex":"none"

})

}

/* popup */

function show(e){

popup.style.display="block"

pname.innerText=e.name

pinfo.innerHTML=`

Số nguyên tử: ${e.n}<br>
Khối lượng nguyên tử: ${e.mass}<br>
Cấu hình electron: ${e.conf}

`

createAtom(e.n)

}

function closePopup(){

popup.style.display="none"

}

/* tạo atom 3D */

function createAtom(z){

atom.innerHTML=""

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(75,400/300,0.1,1000)
camera.position.z=6

const renderer=new THREE.WebGLRenderer()
renderer.setSize(400,300)

atom.appendChild(renderer.domElement)

const controls=new THREE.OrbitControls(camera,renderer.domElement)

/* nucleus */

const nucleus=new THREE.Mesh(

new THREE.SphereGeometry(0.5,32,32),

new THREE.MeshBasicMaterial({color:0xff4444})

)

scene.add(nucleus)

/* electrons */

for(let i=0;i<z;i++){

const electron=new THREE.Mesh(

new THREE.SphereGeometry(0.07,16,16),

new THREE.MeshBasicMaterial({color:0x00ffff})

)

let angle=i/z*Math.PI*2

electron.position.x=Math.cos(angle)*2
electron.position.y=Math.sin(angle)*2

scene.add(electron)

}

/* animation */

function animate(){

requestAnimationFrame(animate)

scene.rotation.y+=0.003

renderer.render(scene,camera)

}

animate()

}

</script>

</body>
</html>
