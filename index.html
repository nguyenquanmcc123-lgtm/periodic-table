<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interactive Periodic Table</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

h1{
text-align:center;
margin:20px;
}

#search{
display:block;
margin:auto;
padding:10px;
width:250px;
font-size:16px;
border-radius:8px;
border:none;
}

#table{
display:grid;
grid-template-columns:repeat(18,60px);
gap:4px;
justify-content:center;
margin-top:20px;
}

.element{
width:60px;
height:60px;
border-radius:6px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
transition:0.2s;
font-size:12px;
}

.element:hover{
transform:scale(1.1);
}

.number{
font-size:10px;
opacity:0.7;
}

.symbol{
font-size:18px;
font-weight:bold;
}

.name{
font-size:9px;
}

/* colors */

.alkali{background:#ef4444}
.alkaline{background:#f97316}
.transition{background:#3b82f6}
.metalloid{background:#14b8a6}
.nonmetal{background:#10b981}
.halogen{background:#eab308}
.noble{background:#a855f7}

/* popup */

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#1e293b;
padding:20px;
border-radius:10px;
display:none;
width:300px;
}

canvas{
margin-top:10px;
background:black;
}

</style>
</head>

<body>

<h1>Interactive Periodic Table</h1>

<input id="search" placeholder="Search element...">

<div id="table"></div>

<div id="popup">
<h2 id="pname"></h2>
<p id="pinfo"></p>
<canvas id="atom" width="260" height="260"></canvas>
<br><br>
<button onclick="closePopup()">Close</button>
</div>

<script>

const elements = [
{n:1,s:"H",name:"Hydrogen",mass:1.008,group:1,period:1,cat:"nonmetal",conf:"1s1"},
{n:2,s:"He",name:"Helium",mass:4.0026,group:18,period:1,cat:"noble",conf:"1s2"},
{n:3,s:"Li",name:"Lithium",mass:6.94,group:1,period:2,cat:"alkali",conf:"[He]2s1"},
{n:4,s:"Be",name:"Beryllium",mass:9.01,group:2,period:2,cat:"alkaline",conf:"[He]2s2"},
{n:5,s:"B",name:"Boron",mass:10.81,group:13,period:2,cat:"metalloid",conf:"[He]2s2 2p1"},
{n:6,s:"C",name:"Carbon",mass:12.01,group:14,period:2,cat:"nonmetal",conf:"[He]2s2 2p2"},
{n:7,s:"N",name:"Nitrogen",mass:14.01,group:15,period:2,cat:"nonmetal",conf:"[He]2s2 2p3"},
{n:8,s:"O",name:"Oxygen",mass:15.99,group:16,period:2,cat:"nonmetal",conf:"[He]2s2 2p4"},
{n:9,s:"F",name:"Fluorine",mass:18.99,group:17,period:2,cat:"halogen",conf:"[He]2s2 2p5"},
{n:10,s:"Ne",name:"Neon",mass:20.18,group:18,period:2,cat:"noble",conf:"[He]2s2 2p6"},

{n:11,s:"Na",name:"Sodium",mass:22.99,group:1,period:3,cat:"alkali",conf:"[Ne]3s1"},
{n:12,s:"Mg",name:"Magnesium",mass:24.30,group:2,period:3,cat:"alkaline",conf:"[Ne]3s2"},
{n:13,s:"Al",name:"Aluminium",mass:26.98,group:13,period:3,cat:"transition",conf:"[Ne]3s2 3p1"},
{n:14,s:"Si",name:"Silicon",mass:28.08,group:14,period:3,cat:"metalloid",conf:"[Ne]3s2 3p2"},
{n:15,s:"P",name:"Phosphorus",mass:30.97,group:15,period:3,cat:"nonmetal",conf:"[Ne]3s2 3p3"},
{n:16,s:"S",name:"Sulfur",mass:32.06,group:16,cat:"nonmetal",group:16,period:3,conf:"[Ne]3s2 3p4"},
{n:17,s:"Cl",name:"Chlorine",mass:35.45,group:17,period:3,cat:"halogen",conf:"[Ne]3s2 3p5"},
{n:18,s:"Ar",name:"Argon",mass:39.95,group:18,period:3,cat:"noble",conf:"[Ne]3s2 3p6"}
]

const table=document.getElementById("table")

function draw(){

table.innerHTML=""

elements.forEach(e=>{

const el=document.createElement("div")
el.className="element "+e.cat

el.style.gridColumn=e.group
el.style.gridRow=e.period

el.innerHTML=`
<div class="number">${e.n}</div>
<div class="symbol">${e.s}</div>
<div class="name">${e.name}</div>
`

el.onclick=()=>show(e)

table.appendChild(el)

})

}

draw()

/* search */

document.getElementById("search").oninput=e=>{

const q=e.target.value.toLowerCase()

document.querySelectorAll(".element").forEach(el=>{

const t=el.innerText.toLowerCase()

el.style.display=t.includes(q)?"flex":"none"

})

}

/* popup */

function show(e){

document.getElementById("popup").style.display="block"
document.getElementById("pname").innerText=e.name

document.getElementById("pinfo").innerHTML=`
Atomic number: ${e.n}<br>
Atomic mass: ${e.mass}<br>
Electron config: ${e.conf}
`

drawAtom(e.n)

}

function closePopup(){
document.getElementById("popup").style.display="none"
}

/* simple 3D atom */

function drawAtom(z){

const c=document.getElementById("atom")
const ctx=c.getContext("2d")

let angle=0

function frame(){

ctx.clearRect(0,0,260,260)

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(130,130,10,0,Math.PI*2)
ctx.fill()

const r=60

for(let i=0;i<z;i++){

let a=angle+i*(2*Math.PI/z)

let x=130+Math.cos(a)*r
let y=130+Math.sin(a)*r

ctx.beginPath()
ctx.arc(x,y,3,0,Math.PI*2)
ctx.fill()

}

angle+=0.02
requestAnimationFrame(frame)

}

frame()

}

</script>

</body>
</html>
