<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bảng tuần hoàn 3D nâng cấp</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
}

h1{
text-align:center;
margin:20px;
}

#search{
display:block;
margin:auto;
padding:12px;
width:300px;
border-radius:10px;
border:none;
font-size:15px;
}

#table{
display:grid;
grid-template-columns:repeat(18,70px);
gap:6px;
justify-content:center;
margin-top:25px;
}

.element{
height:70px;
border-radius:10px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
transition:.2s;
box-shadow:0 0 8px rgba(0,0,0,0.5);
}

.element:hover{
transform:scale(1.15);
box-shadow:0 0 15px cyan;
}

.number{font-size:10px}
.symbol{font-size:22px;font-weight:bold}
.name{font-size:9px}

.alkali{background:#ef4444}
.nonmetal{background:#10b981}
.halogen{background:#eab308}
.noble{background:#a855f7}

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#1e293b;
padding:20px;
border-radius:12px;
display:none;
width:520px;
box-shadow:0 0 30px black;
}

#atom3d{
width:480px;
height:320px;
margin:auto;
}

button{
padding:8px 16px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
background:#3b82f6;
color:white;
}

</style>
</head>

<body>

<h1>🧪 Bảng Tuần Hoàn Tương Tác</h1>

<input id="search" placeholder="Tìm tên, ký hiệu hoặc số nguyên tử">

<div id="table"></div>

<div id="popup">

<h2 id="pname"></h2>

<p id="pinfo"></p>

<p id="wiki"></p>

<div id="atom3d"></div>

<button onclick="closePopup()">Đóng</button>

</div>

<script>

/* dữ liệu */

const elements=[
{n:1,s:"H",name:"Hiđrô",group:1,period:1,cat:"nonmetal"},
{n:2,s:"He",name:"Heli",group:18,period:1,cat:"noble"},
{n:3,s:"Li",name:"Liti",group:1,period:2,cat:"alkali"},
{n:4,s:"Be",name:"Beri",group:2,period:2,cat:"alkali"},
{n:5,s:"B",name:"Bo",group:13,period:2,cat:"nonmetal"},
{n:6,s:"C",name:"Cacbon",group:14,period:2,cat:"nonmetal"},
{n:7,s:"N",name:"Nitơ",group:15,period:2,cat:"nonmetal"},
{n:8,s:"O",name:"Oxi",group:16,period:2,cat:"nonmetal"},
{n:9,s:"F",name:"Flo",group:17,period:2,cat:"halogen"},
{n:10,s:"Ne",name:"Neon",group:18,period:2,cat:"noble"},
{n:11,s:"Na",name:"Natri",group:1,period:3,cat:"alkali"},
{n:12,s:"Mg",name:"Magiê",group:2,period:3,cat:"alkali"},
{n:13,s:"Al",name:"Nhôm",group:13,period:3,cat:"nonmetal"},
{n:14,s:"Si",name:"Silic",group:14,period:3,cat:"nonmetal"},
{n:15,s:"P",name:"Photpho",group:15,period:3,cat:"nonmetal"},
{n:16,s:"S",name:"Lưu huỳnh",group:16,period:3,cat:"nonmetal"},
{n:17,s:"Cl",name:"Clo",group:17,period:3,cat:"halogen"},
{n:18,s:"Ar",name:"Argon",group:18,period:3,cat:"noble"}
]

const table=document.getElementById("table")

elements.forEach(e=>{

let el=document.createElement("div")

el.className="element "+e.cat
el.style.gridColumn=e.group
el.style.gridRow=e.period

el.innerHTML=`
<div class="number">${e.n}</div>
<div class="symbol">${e.s}</div>
<div class="name">${e.name}</div>
`

el.onclick=()=>showElement(e)

table.appendChild(el)

})

/* search */

search.oninput=e=>{

let q=e.target.value.toLowerCase()

document.querySelectorAll(".element").forEach(el=>{

let txt=el.innerText.toLowerCase()

el.style.display=txt.includes(q)?"flex":"none"

})

}

/* electron config */

function electronConfig(z){

const order=[
["1s",2],["2s",2],["2p",6],
["3s",2],["3p",6],
["4s",2],["3d",10],
["4p",6]
]

let result=""
let e=z

for(let o of order){

if(e<=0)break

let fill=Math.min(o[1],e)

result+=o[0]+fill+" "

e-=fill

}

return result

}

/* popup */

function showElement(e){

popup.style.display="block"

pname.innerText=e.name

pinfo.innerHTML=`
Số nguyên tử: ${e.n}<br>
Cấu hình electron: ${electronConfig(e.n)}
`

loadWiki(e.name)

createAtom(e.n)

}

function closePopup(){
popup.style.display="none"
}

/* wikipedia */

function loadWiki(name){

fetch("https://vi.wikipedia.org/api/rest_v1/page/summary/"+name)

.then(r=>r.json())

.then(d=>{

wiki.innerText=d.extract||"Không tìm thấy thông tin."

})

.catch(()=>{

wiki.innerText="Không tải được Wikipedia."

})

}

/* electron shell */

function shells(z){

const cap=[2,8,18,32]
let arr=[]
let e=z

for(let c of cap){

let fill=Math.min(c,e)

arr.push(fill)

e-=fill

if(e<=0)break

}

return arr

}

/* atom 3D */

function createAtom(z){

atom3d.innerHTML=""

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(75,480/320,0.1,1000)
camera.position.z=8

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(480,320)

atom3d.appendChild(renderer.domElement)

new THREE.OrbitControls(camera,renderer.domElement)

/* light */

const light=new THREE.PointLight(0xffffff,1)
light.position.set(5,5,5)
scene.add(light)

/* nucleus */

const nucleus=new THREE.Mesh(
new THREE.SphereGeometry(0.5,32,32),
new THREE.MeshPhongMaterial({color:0xff4444})
)

scene.add(nucleus)

/* shells */

let shellData=shells(z)

let electrons=[]

shellData.forEach((count,i)=>{

let r=1.5+i*1.2

let orbit=new THREE.Mesh(
new THREE.TorusGeometry(r,0.01,16,100),
new THREE.MeshBasicMaterial({color:0xffffff})
)

orbit.rotation.x=Math.PI/2
scene.add(orbit)

for(let j=0;j<count;j++){

let e=new THREE.Mesh(
new THREE.SphereGeometry(0.08,16,16),
new THREE.MeshBasicMaterial({color:0x00ffff})
)

scene.add(e)

electrons.push({
mesh:e,
radius:r,
angle:(j/count)*Math.PI*2,
speed:0.01+Math.random()*0.01
})

}

})

function animate(){

requestAnimationFrame(animate)

electrons.forEach(e=>{

e.angle+=e.speed

e.mesh.position.x=Math.cos(e.angle)*e.radius
e.mesh.position.z=Math.sin(e.angle)*e.radius

})

renderer.render(scene,camera)

}

animate()

}

</script>

</body>
</html>
