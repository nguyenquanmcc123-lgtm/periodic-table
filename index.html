<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Periodic Table</title>

<style>

body{
margin:0;
font-family:Arial;
background:#061633;
color:white;
text-align:center;
}

/* SEARCH */
#search{
margin:15px;
padding:10px;
width:260px;
border-radius:6px;
border:none;
}

/* TABLE */
#table{
display:grid;
grid-template-columns:repeat(18,1fr);
gap:6px;
max-width:1200px;
margin:auto;
padding:10px;
}

/* ELEMENT */
.element{
border-radius:8px;
padding:8px;
cursor:pointer;
position:relative;
font-size:12px;
transition:0.2s;
}

.element:hover{
transform:scale(1.08);
}

.num{
font-size:9px;
position:absolute;
top:4px;
left:6px;
}

.sym{
font-size:18px;
font-weight:bold;
}

/* IUPAC COLORS */

.alkali{background:#ff6666}
.alkaline{background:#ffdead}
.transition{background:#ffc0cb}
.post{background:#cccccc}
.metalloid{background:#cccc99}
.nonmetal{background:#a0ffa0}
.halogen{background:#ffff99}
.noble{background:#b0e0ff}

/* ELECTRON CANVAS */

#orbit{
margin-top:20px;
}

canvas{
background:#020b22;
border-radius:10px;
}

/* MOBILE */

@media(max-width:900px){

#table{
grid-template-columns:repeat(9,1fr);
}

}

</style>

</head>

<body>

<h2>⚛️ 3D Periodic Table</h2>

<input id="search" placeholder="Search element">

<div id="table"></div>

<div id="orbit">
<canvas id="atom" width="250" height="250"></canvas>
</div>

<script>

/* ELEMENT DATA */

const elements=[
{n:1,s:"H",p:1,g:"nonmetal"},
{n:2,s:"He",p:18,g:"noble"},

{n:3,s:"Li",p:1,g:"alkali"},
{n:4,s:"Be",p:2,g:"alkaline"},
{n:5,s:"B",p:13,g:"metalloid"},
{n:6,s:"C",p:14,g:"nonmetal"},
{n:7,s:"N",p:15,g:"nonmetal"},
{n:8,s:"O",p:16,g:"nonmetal"},
{n:9,s:"F",p:17,g:"halogen"},
{n:10,s:"Ne",p:18,g:"noble"},

{n:11,s:"Na",p:1,g:"alkali"},
{n:12,s:"Mg",p:2,g:"alkaline"},
{n:13,s:"Al",p:13,g:"post"},
{n:14,s:"Si",p:14,g:"metalloid"},
{n:15,s:"P",p:15,g:"nonmetal"},
{n:16,s:"S",p:16,g:"nonmetal"},
{n:17,s:"Cl",p:17,g:"halogen"},
{n:18,s:"Ar",p:18,g:"noble"}
];

/* ADD FAKE TO 118 */

for(let i=19;i<=118;i++){
elements.push({n:i,s:"E"+i,p:(i%18)+1,g:"transition"});
}

/* CREATE TABLE */

const table=document.getElementById("table");

elements.forEach(el=>{

let d=document.createElement("div");

d.className="element "+el.g;
d.style.gridColumn=el.p;

d.dataset.group=el.g;
d.dataset.name=el.s.toLowerCase();

d.innerHTML=
`<div class="num">${el.n}</div>
<div class="sym">${el.s}</div>`;

d.onclick=()=>highlight(el.g);

table.appendChild(d);

});

/* HIGHLIGHT GROUP */

function highlight(g){

document.querySelectorAll(".element").forEach(e=>{
e.style.outline="none";
});

document.querySelectorAll("."+g).forEach(e=>{
e.style.outline="3px solid yellow";
});

}

/* SEARCH */

document.getElementById("search").oninput=function(){

let v=this.value.toLowerCase();

document.querySelectorAll(".element").forEach(el=>{

if(el.dataset.name.includes(v)){
el.style.display="block";
}else{
el.style.display="none";
}

});

};

/* 3D ELECTRON ORBIT */

const canvas=document.getElementById("atom");
const ctx=canvas.getContext("2d");

let angle=0;

function draw(){

ctx.clearRect(0,0,250,250);

let cx=125;
let cy=125;

ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(cx,cy,8,0,Math.PI*2);
ctx.fill();

for(let i=1;i<=3;i++){

ctx.strokeStyle="white";
ctx.beginPath();
ctx.arc(cx,cy,30*i,0,Math.PI*2);
ctx.stroke();

let ex=cx+Math.cos(angle+i)*30*i;
let ey=cy+Math.sin(angle+i)*30*i;

ctx.fillStyle="cyan";
ctx.beginPath();
ctx.arc(ex,ey,4,0,Math.PI*2);
ctx.fill();

}

angle+=0.03;

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
